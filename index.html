<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etch A Sketch 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fredoka+One&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      width: 100vw;
      height: 100vh;
    }
    #threeCanvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
    }
    /* ── Bouncing text ── */
    #bouncer {
      position: fixed;
      z-index: 50;
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 1px;
      white-space: nowrap;
      pointer-events: auto;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- Bouncing DVD-style text -->
  <div id="bouncer">Connect to Arduino</div>

  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
  <script>
    // ── DVD Bouncing Text ──
    (function() {
      const el = document.getElementById('bouncer');
      let x = 100, y = 80;
      let vx = 2.2, vy = 1.8;

      const colors = [
        '#d4a843', '#1a6dd4', '#2d8c3c',
        '#e8739a', '#f5a623', '#6b4caf', '#17ac10',
        '#00b4d8', '#ff6f61', '#9b5de5'
      ];
      let colorIdx = 0;

      function pickColor() {
        el.style.color = colors[colorIdx % colors.length];
        colorIdx++;
      }
      pickColor();

      function tick() {
        if (el.classList.contains('gone')) return;

        const w = window.innerWidth;
        const h = window.innerHeight;
        const rect = el.getBoundingClientRect();
        const elW = rect.width;
        const elH = rect.height;

        x += vx;
        y += vy;

        if (x + elW >= w) { x = w - elW; vx *= -1; pickColor(); }
        if (x <= 0)       { x = 0;       vx *= -1; pickColor(); }
        if (y + elH >= h) { y = h - elH; vy *= -1; pickColor(); }
        if (y <= 0)       { y = 0;       vy *= -1; pickColor(); }

        el.style.left = x + 'px';
        el.style.top = y + 'px';

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      // Listen for connect — hide bouncer
      window.addEventListener('serial-connected', () => {
        el.classList.add('gone');
        el.style.display = 'none';
      });

      // Click bouncer to connect
      el.addEventListener('click', () => {
        if (window.connectSerial) window.connectSerial();
      });
    })();
  </script>
</body>
</html>
